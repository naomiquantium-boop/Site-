name = "spyton-listings-mvp"
main = "src/worker.js"
compatibility_date = "2026-03-08"

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "spyton_listings"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
APP_NAME = "SpyTON Listings"
PAYMENT_WALLET = "UQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAJKZ"
CURRENCY = "TON"
